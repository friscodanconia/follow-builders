name: Keepalive

# Prevents GitHub from disabling scheduled workflows on repos with low activity.
# GitHub disables cron triggers after 60 days of no repo activity (commits, issues, PRs).
# This workflow runs weekly and makes a lightweight API call to keep the repo "active."

on:
  schedule:
    # Every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Keepalive ping
        uses: actions/github-script@v7
        with:
          script: |
            // Enable the digest workflow explicitly in case GitHub auto-disabled it
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                console.log(`Re-enabling workflow: ${wf.name} (${wf.id})`);
                await github.rest.actions.enableWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: wf.id,
                });
              }
            }
            console.log('Keepalive complete');
