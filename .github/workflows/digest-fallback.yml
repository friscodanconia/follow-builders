name: Digest Fallback

# Safety net: runs 2 hours after the primary digest cron.
# If no digest was generated today, triggers the main workflow.
# This catches GitHub's silent cron skips.

on:
  schedule:
    # 02:30 UTC = 2 hours after the primary 00:30 UTC trigger
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check if today's digest exists
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ -f "history/${TODAY}.md" ]; then
            echo "Digest for ${TODAY} already exists, skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No digest for ${TODAY} found. Triggering main workflow."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger digest workflow
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generate-feed.yml',
              ref: 'main',
            });
            console.log('Triggered generate-feed.yml');
