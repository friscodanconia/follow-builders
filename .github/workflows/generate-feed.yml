name: Mirror Upstream Feeds & Publish Digest

on:
  schedule:
    # Daily at 6 AM IST (00:30 UTC)
    - cron: '30 0 * * *'
    # Backup trigger at 7 AM IST in case GitHub skips the first one
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      skip_digest:
        description: 'Skip digest generation (just mirror feeds)'
        required: false
        default: false
        type: boolean
      backfill:
        description: 'Backfill all old digests with current prompt'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      UPSTREAM_RAW_BASE_URL: https://raw.githubusercontent.com/zarazhangrui/follow-builders/main
      FOLLOW_BUILDERS_SUBSCRIBE_URL: https://buttondown.com/api/emails/soumyo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm run setup

      - name: Mirror feeds from upstream repo
        run: |
          echo "Mirroring feed snapshots from upstream..."
          curl -sf "$UPSTREAM_RAW_BASE_URL/feed-x.json" -o feed-x.json
          curl -sf "$UPSTREAM_RAW_BASE_URL/feed-podcasts.json" -o feed-podcasts.json
          curl -sf "$UPSTREAM_RAW_BASE_URL/feed-blogs.json" -o feed-blogs.json

      - name: Fetch additional official, editorial, and China-focused sources
        continue-on-error: true
        run: cd scripts && node fetch-external-sources.js

      - name: Validate mirrored feeds
        run: npm run verify:feeds

      - name: Build structured history
        run: npm run build:structured

      - name: Generate digest
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts && node generate-digest.js > /tmp/digest.md
          echo "--- Digest preview (first 500 chars) ---"
          head -c 500 /tmp/digest.md

      - name: Save history
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        run: |
          cd scripts && node save-history.js --file /tmp/digest.md

      - name: Backfill old digests
        if: ${{ github.event.inputs.backfill == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/backfill-digests.js

      - name: Sync site data
        run: npm --prefix scripts run sync-site-data

      - name: Publish newsletter
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        continue-on-error: true
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          cd scripts && node publish-newsletter.js --file /tmp/digest.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json feed-external.json state-feed.json history/ site/data/
          git diff --cached --quiet || git commit -m "chore: mirror feeds and refresh digest"
          git push
