name: Generate Feeds & Publish Digest

on:
  schedule:
    # Daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only
          - blogs-only
      skip_digest:
        description: 'Skip digest generation (just fetch feeds)'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      # ── Step 1a: Pull tweet feed from upstream (free, no X API needed) ─
      - name: Pull tweet feed from upstream
        run: |
          echo "Fetching tweet feed from upstream repo..."
          curl -sf https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json -o feed-x.json \
            && echo "Tweet feed updated from upstream" \
            || echo "Warning: could not fetch upstream tweet feed, using existing"

      # ── Step 1b: Fetch podcast & blog feeds (free APIs) ──────────────
      - name: Generate podcast and blog feeds
        env:
          POD2TXT_API_KEY: ${{ secrets.POD2TXT_API_KEY }}
        run: |
          cd scripts && node generate-feed.js --podcasts-only
          cd scripts && node generate-feed.js --blogs-only

      # ── Step 2: Generate digest via Claude API ───────────────────────
      - name: Generate digest
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts && node generate-digest.js > /tmp/digest.md
          echo "--- Digest preview (first 500 chars) ---"
          head -c 500 /tmp/digest.md

      # ── Step 3: Save to history ──────────────────────────────────────
      - name: Save history
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        run: |
          cd scripts && node save-history.js --file /tmp/digest.md

      # ── Step 4: Send newsletter via Buttondown ───────────────────────
      - name: Publish newsletter
        if: ${{ github.event.inputs.skip_digest != 'true' }}
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          cd scripts && node publish-newsletter.js --file /tmp/digest.md

      # ── Step 5: Commit and push (triggers Vercel rebuild) ────────────
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-blogs.json state-feed.json history/
          git diff --cached --quiet || git commit -m "chore: update feeds and digest [skip ci]"
          git push
